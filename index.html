<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mushroom Timer</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.09);
    }

    h1 {
      margin-top: 0;
      background: linear-gradient(135deg, #1f5cc8 0%, #174aa3 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 36px;
    }

    .hint {
      color: #666;
      font-size: 15px;
      margin-bottom: 20px;
      line-height: 1.7;
      padding: 12px 16px;
      background: #f8fbff;
      border-left: 4px solid #1f5cc8;
      border-radius: 6px;
    }

    .input-area {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: #fff;
      color: #222;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      border-color: #1f5cc8;
      box-shadow: 0 0 0 3px rgba(31, 92, 200, 0.15);
    }

    select {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231f5cc8' stroke-width='2'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 20px;
      padding-right: 36px;
    }

    select option {
      padding: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .btn-add {
      background: linear-gradient(135deg, #1f5cc8 0%, #174aa3 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(31, 92, 200, 0.3);
    }

    .btn-add:hover {
      background: linear-gradient(135deg, #174aa3 0%, #0d3a7a 100%);
      box-shadow: 0 6px 16px rgba(31, 92, 200, 0.4);
      transform: translateY(-2px);
    }

    .btn-danger {
      background: linear-gradient(135deg, #d93025 0%, #c5221f 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(217, 48, 37, 0.2);
    }

    .btn-danger:hover {
      background: linear-gradient(135deg, #c5221f 0%, #a71f1a 100%);
      box-shadow: 0 4px 12px rgba(217, 48, 37, 0.3);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #e8eefc 0%, #dce7ff 100%);
      color: #1f5cc8;
      box-shadow: 0 2px 8px rgba(31, 92, 200, 0.1);
      border: 1px solid #d6e2ff;
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, #dce7ff 0%, #cfe0ff 100%);
      box-shadow: 0 4px 12px rgba(31, 92, 200, 0.2);
      transform: translateY(-1px);
    }

    .btn-small {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
    }

    .location-memory {
      margin: 0 0 16px 0;
      padding: 14px 16px;
      background: linear-gradient(135deg, #f8fafc 0%, #f0f7ff 100%);
      border: 1px solid #e0e8ff;
      border-radius: 12px;
    }

    .location-memory-title {
      font-size: 13px;
      font-weight: bold;
      color: #555;
      margin-bottom: 8px;
    }

    .location-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .location-chip {
      background: linear-gradient(135deg, #e8eefc 0%, #dce7ff 100%);
      color: #1f5cc8;
      border: 1px solid #d0ddff;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s ease;
      box-shadow: 0 2px 6px rgba(31, 92, 200, 0.1);
    }

    .location-chip:hover {
      background: linear-gradient(135deg, #dce7ff 0%, #cfe0ff 100%);
      box-shadow: 0 4px 10px rgba(31, 92, 200, 0.2);
      transform: translateY(-2px);
    }

    .empty-location {
      color: #888;
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 14px 12px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: linear-gradient(135deg, #f8fafc 0%, #f0f7ff 100%);
      font-size: 14px;
      color: #333;
      font-weight: 600;
    }

    .countdown {
      font-size: 24px;
      font-weight: bold;
      color: #1f5cc8;
      white-space: nowrap;
    }

    .warning {
      color: #f29900;
      animation: blink 1s infinite;
    }

    .done {
      color: #d93025;
      font-weight: bold;
    }

    .status-running {
      color: #0f9d58;
      font-weight: bold;
    }

    .status-warning {
      color: #f29900;
      font-weight: bold;
    }

    .status-done {
      color: #d93025;
      font-weight: bold;
    }

    .completion-time {
      font-size: 16px;
      font-weight: bold;
      color: #1f5cc8;
    }

    small {
      color: #444;
      line-height: 1.6;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    @media (max-width: 760px) {
      body { padding: 12px; }
      h1 { font-size: 28px; }
      .input-area { grid-template-columns: 1fr; }
      .top-actions { justify-content: flex-start; flex-wrap: wrap; }

      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 12px;
        padding: 10px;
      }
      td {
        border: none;
        padding: 7px 4px;
      }
      td::before {
        content: attr(data-label) "：";
        font-weight: bold;
        color: #555;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mushroom Timer</h1>

    <div class="hint">
      輸入地點，然後選擇分鐘和秒數，系統會自動加 5 分鐘。<br>
      每筆資料獨立倒數，剩餘時間由短到長排序；當倒數進入最後 15 秒，每秒會發出鳥鳴聲提醒。
    </div>

    <div class="input-area">
      <div>
        <label for="location">地點</label>
        <input id="location" type="text" placeholder="例如 中正紀念堂" />
      </div>

      <div>
        <label for="minute">分鐘</label>
        <select id="minute">
          <option value="">選擇</option>
        </select>
      </div>

      <div>
        <label for="second">秒</label>
        <select id="second">
          <option value="">選擇</option>
        </select>
      </div>

      <button class="btn-add" onclick="addRecord()">新增倒數</button>
    </div>

    <div class="location-memory">
      <div class="location-memory-title">常用地點（點一下可帶入地點欄位）</div>
      <div id="locationButtons" class="location-buttons"></div>
      <div style="margin-top: 10px;">
        <button class="btn-secondary btn-small" onclick="clearLocationHistory()">清除地點記憶</button>
      </div>
    </div>

    <div class="top-actions">
      <button class="btn-secondary btn-small" onclick="requestNotificationPermission()">開啟桌面通知</button>
      <button class="btn-danger btn-small" onclick="clearAllRecords()">清除全部</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>地點</th>
          <th>完成時間</th>
          <th>剩餘倒數</th>
          <th>狀態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="recordBody"></tbody>
    </table>
  </div>

  <script>
    let records = JSON.parse(localStorage.getItem("timerRecords")) || [];
    let nextId = Number(localStorage.getItem("timerNextId")) || 1;
    let locationHistory = JSON.parse(localStorage.getItem("timerLocationHistory")) || [];

    function saveRecords() {
      localStorage.setItem("timerRecords", JSON.stringify(records));
      localStorage.setItem("timerNextId", String(nextId));
      localStorage.setItem("timerLocationHistory", JSON.stringify(locationHistory));
    }

    function addRecord() {
      const minute = Number(document.getElementById("minute").value) || 0;
      const second = Number(document.getElementById("second").value) || 0;
      const location = document.getElementById("location").value.trim();
      const extraMinute = 5; // 固定為 5 分鐘

      if (!location) {
        alert("請輸入地點");
        return;
      }

      if (minute === 0 && second === 0) {
        alert("請選擇有效的時間");
        return;
      }

      const originalSeconds = minute * 60 + second;
      const totalSeconds = originalSeconds + extraMinute * 60;
      const targetTime = Date.now() + totalSeconds * 1000;

      records.push({
        id: nextId++,
        location: location,
        originalSeconds: originalSeconds,
        extraMinute: extraMinute,
        totalSeconds: totalSeconds,
        targetTime: targetTime,
        notified: false,
        preNotified: false
      });

      addLocationToHistory(location);
      saveRecords();
      renderRecords();

      document.getElementById("minute").value = "";
      document.getElementById("second").value = "";
      document.getElementById("location").value = "";
      document.getElementById("location").focus();
    }

    function addLocationToHistory(location) {
      const normalized = location.trim();
      if (!normalized) return;

      // 不分大小寫去重，但保留最新輸入的顯示文字
      locationHistory = locationHistory.filter(x => x.toLowerCase() !== normalized.toLowerCase());
      locationHistory.unshift(normalized);

      // 最多保留 20 個常用地點，避免畫面按鈕太多
      locationHistory = locationHistory.slice(0, 20);
      saveRecords();
      renderLocationButtons();
    }

    function renderLocationButtons() {
      const container = document.getElementById("locationButtons");
      if (!container) return;

      container.innerHTML = "";

      if (locationHistory.length === 0) {
        container.innerHTML = '<span class="empty-location">目前還沒有常用地點，新增倒數後會自動記憶。</span>';
        return;
      }

      locationHistory.forEach(location => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "location-chip";
        btn.textContent = location;
        btn.onclick = () => {
          document.getElementById("location").value = location;
          document.getElementById("minute").focus();
        };
        container.appendChild(btn);
      });
    }

    function renderRecords() {
      const body = document.getElementById("recordBody");
      body.innerHTML = "";

      // 依剩餘倒數排序：未完成的由短到長；已完成的放最下面
      const sortedRecords = [...records].sort((a, b) => {
        const remainingA = a.targetTime - Date.now();
        const remainingB = b.targetTime - Date.now();

        const isDoneA = remainingA <= 0;
        const isDoneB = remainingB <= 0;

        if (isDoneA && !isDoneB) return 1;
        if (!isDoneA && isDoneB) return -1;

        return remainingA - remainingB;
      });

      sortedRecords.forEach((record, index) => {
        const remaining = Math.ceil((record.targetTime - Date.now()) / 1000);
        const isDone = remaining <= 0;
        const isWarning = remaining > 0 && remaining <= 15;

        // 從 15 秒開始，每秒發出鳥鳴聲通知
        if (isWarning) {
          playBirdSound();
        }

        // 時間到時發出一次完成提醒
        if (isDone && !record.notified) {
          record.notified = true;
          saveRecords();
          playBirdSound();
        }

        let countdownClass = "countdown";
        if (isDone) countdownClass += " done";
        else if (isWarning) countdownClass += " warning";

        let statusText = "Running";
        let statusClass = "status-running";
        if (isDone) {
          statusText = "Completed";
          statusClass = "status-done";
        } else if (isWarning) {
          statusText = "Warning";
          statusClass = "status-warning";
        }

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="#">${index + 1}</td>
          <td data-label="地點">${escapeHtml(record.location)}</td>
          <td data-label="完成時間" class="completion-time">${formatClock(record.targetTime)}</td>
          <td data-label="剩餘倒數" class="${countdownClass}">
            ${isDone ? "時間到" : formatTime(remaining)}
          </td>
          <td data-label="狀態" class="${statusClass}">${statusText}</td>
          <td data-label="操作">
            <button class="btn-danger btn-small" onclick="deleteRecord(${record.id})">刪除</button>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    function notifyUser(record, isEarly) {
      const title = isEarly ? "⏰ 即將到時間（15秒）" : "✓ 倒數時間到";
      const message = isEarly
        ? `即將到時間（15秒）！地點：${record.location}`
        : `時間到！地點：${record.location}`;

      // 發送桌面通知（優先使用，可在其他標籤頁顯示）
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification(title, {
          body: `地點：${record.location}`,
          tag: isEarly ? `warning-${record.id}` : `done-${record.id}`,
          badge: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%231f5cc8'/></svg>",
          requireInteraction: true,  // 強制顯示，不會自動消失
          vibrate: isEarly ? [200, 100, 200] : [300, 100, 300]  // 震動反饋
        });

        // 播放音效（可選，某些瀏覽器可能受限制）
        playNotificationSound(isEarly);
      } else {
        // 備選方案：若沒有通知權限，使用 alert
        alert(message);
      }
    }

    function playBirdSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        // 鳥鳴聲（快速跳躍）— 每個音符用獨立的 oscillator，避免 start() 只能呼叫一次的限制
        const freqs = [1400, 1800, 1400];
        freqs.forEach((freq, idx) => {
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          oscillator.frequency.setValueAtTime(freq, audioContext.currentTime + idx * 0.12);
          gainNode.gain.setValueAtTime(0.25, audioContext.currentTime + idx * 0.12);
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + idx * 0.12 + 0.09);
          oscillator.start(audioContext.currentTime + idx * 0.12);
          oscillator.stop(audioContext.currentTime + idx * 0.12 + 0.09);
        });
      } catch (e) {
        console.log("音效播放失敗", e);
      }
    }

    function deleteRecord(id) {
      records = records.filter(r => r.id !== id);
      saveRecords();
      renderRecords();
    }

    function clearAllRecords() {
      if (!confirm("確定要清除全部倒數紀錄嗎？")) return;
      records = [];
      saveRecords();
      renderRecords();
    }

    function clearLocationHistory() {
      if (!confirm("確定要清除全部地點記憶嗎？目前倒數資料不會被刪除。")) return;
      locationHistory = [];
      saveRecords();
      renderLocationButtons();
    }

    function requestNotificationPermission() {
      if (!("Notification" in window)) {
        alert("這個瀏覽器不支援桌面通知");
        return;
      }

      Notification.requestPermission().then(permission => {
        if (permission === "granted") {
          alert("桌面通知已開啟");
        } else {
          alert("尚未允許桌面通知，仍會使用彈跳視窗提醒");
        }
      });
    }

    function formatTime(seconds) {
      seconds = Math.max(0, Math.floor(seconds));
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}分 ${String(s).padStart(2, "0")}秒`;
    }

    function formatClock(timestamp) {
      const d = new Date(timestamp);
      return d.toLocaleTimeString("zh-TW", { hour12: false });
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }

    // 每秒重新整理一次畫面、排序與倒數狀態
    setInterval(renderRecords, 1000);
    renderLocationButtons();
    renderRecords();

    // 初始化分鐘和秒的下拉選項
    const minuteSelect = document.getElementById("minute");
    for (let i = 0; i <= 59; i++) {
      const option = document.createElement("option");
      option.value = i;
      option.textContent = i + " 分";
      minuteSelect.appendChild(option);
    }

    const secondSelect = document.getElementById("second");
    for (let i = 0; i <= 59; i++) {
      const option = document.createElement("option");
      option.value = i;
      option.textContent = i + " 秒";
      secondSelect.appendChild(option);
    }
  </script>
</body>
</html>
